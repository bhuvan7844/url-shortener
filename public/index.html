<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URL Shortener</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .card {
    background: #fff;
    width: 100%;
    max-width: 500px;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.2);
  }

  h2 {
    font-size: 24px;
    color: #1f2937;
    margin-bottom: 6px;
  }

  .subtitle {
    color: #9ca3af;
    font-size: 14px;
    margin-bottom: 28px;
  }

  /* Input row */
  .input-row {
    display: flex;
    border: 1.5px solid #d1d5db;
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .input-row:focus-within {
    border-color: #6366f1;
    box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
  }

  .input-row input {
    flex: 1;
    padding: 14px 16px;
    font-size: 14px;
    border: none;
    outline: none;
    color: #1f2937;
    background: transparent;
  }

  .input-row input::placeholder { color: #9ca3af; }

  .paste-btn {
    padding: 0 16px;
    background: #f9fafb;
    border: none;
    border-left: 1.5px solid #d1d5db;
    cursor: pointer;
    color: #6b7280;
    font-size: 13px;
    font-weight: 500;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
  }

  .paste-btn:hover { background: #f3f4ff; color: #6366f1; }

  /* Shorten button */
  .shorten-btn {
    width: 100%;
    padding: 14px;
    margin-top: 12px;
    font-size: 15px;
    font-weight: 600;
    border: none;
    border-radius: 12px;
    background: #6366f1;
    color: #fff;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }

  .shorten-btn:hover { background: #4f46e5; }
  .shorten-btn:active { transform: scale(0.98); }

  /* Result box */
  #result {
    margin-top: 20px;
    padding: 16px;
    background: #f5f3ff;
    border: 1.5px solid #e0e0ff;
    border-radius: 12px;
    display: none;
    animation: fadeIn 0.2s ease;
  }

  .result-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #9ca3af;
    margin-bottom: 8px;
  }

  .result-link-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #shortLink {
    flex: 1;
    font-size: 15px;
    font-weight: 600;
    color: #4f46e5;
    text-decoration: none;
    word-break: break-all;
  }

  #shortLink:hover { text-decoration: underline; }

  .copy-btn {
    flex-shrink: 0;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 600;
    border: 1.5px solid #c7d2fe;
    border-radius: 8px;
    background: #fff;
    color: #6366f1;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
  }

  .copy-btn:hover { background: #6366f1; color: #fff; border-color: #6366f1; }
  .copy-btn.copied { background: #6366f1; color: #fff; border-color: #6366f1; }

  /* Error box */
  #error {
    margin-top: 14px;
    padding: 12px 16px;
    background: #fef2f2;
    border: 1.5px solid #fecaca;
    border-radius: 12px;
    color: #dc2626;
    font-size: 14px;
    display: none;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
  <div class="card">
    <h2>URL Shortener</h2>
    <p class="subtitle">Paste a long link and get a short one instantly.</p>

    <div class="input-row">
      <input type="text" id="urlInput" placeholder="https://example.com/very/long/path">
      <button class="paste-btn" onclick="pasteUrl()">📋 Paste</button>
    </div>
    <button class="shorten-btn" onclick="shorten()">Shorten →</button>

    <div id="result">
      <div class="result-label">Your Short URL</div>
      <div class="result-link-row">
        <a id="shortLink" href="#" target="_blank"></a>
        <button class="copy-btn" id="copyBtn" onclick="copyLink()">Copy</button>
      </div>
    </div>

    <div id="error"></div>
  </div>

  <script>
    async function pasteUrl() {
      try {
        const text = await navigator.clipboard.readText();
        document.getElementById('urlInput').value = text;
        document.getElementById('urlInput').focus();
      } catch {
        alert('Clipboard access denied. Please paste manually with Ctrl+V.');
      }
    }

    function copyLink() {
      const url = document.getElementById('shortLink').textContent;
      const btn = document.getElementById('copyBtn');
      navigator.clipboard.writeText(url).then(() => {
        btn.textContent = '✓ Copied';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'Copy';
          btn.classList.remove('copied');
        }, 2000);
      }).catch(() => alert('Copy failed. Please copy manually.'));
    }

    async function shorten() {
      const url = document.getElementById('urlInput').value.trim();
      const resultDiv = document.getElementById('result');
      const errorDiv = document.getElementById('error');
      resultDiv.style.display = 'none';
      errorDiv.style.display = 'none';

      if (!url) {
        errorDiv.textContent = 'Please enter a URL.';
        errorDiv.style.display = 'block';
        return;
      }

      try {
        const res = await fetch('/shorten', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });

        const data = await res.json();

        if (!res.ok) {
          errorDiv.textContent = data.error || 'Something went wrong.';
          errorDiv.style.display = 'block';
          return;
        }

        const link = document.getElementById('shortLink');
        link.href = data.short_url;
        link.textContent = data.short_url;
        resultDiv.style.display = 'block';
      } catch (err) {
        errorDiv.textContent = 'Failed to reach server.';
        errorDiv.style.display = 'block';
      }
    }
  </script>
</body>
</html>
